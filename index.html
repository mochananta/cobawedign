<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Wedding Invitation</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
    }

    .font-title {
      font-family: 'Playfair Display', serif;
    }
  </style>
</head>

<body class="flex justify-center">

  <!-- WRAPPER (BIAR DESKTOP TIDAK FULL LEBAR) -->
  <div class="w-full max-w-[430px] bg-gradient-to-br from-purple-200 to-pink-200 relative shadow-2xl">

    <!-- ================= COVER ================= -->
    <section id="cover" class="absolute inset-0 z-50">

      <div class="relative w-full min-h-screen overflow-hidden">

        <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover">
          <source src="Untitled design.mp4" type="video/mp4">
        </video>

        <!-- Overlay -->
        <div class="absolute inset-0 bg-black/10"></div>

        <!-- Content -->
        <div class="relative z-10 flex flex-col items-center justify-center text-center px-6 min-h-screen">

          <p class="uppercase tracking-[4px] text-white text-xs mb-6">
            The Wedding Of
          </p>

          <h1 class="font-title text-4xl text-white mb-8 drop-shadow-lg">
            Ardi & Nabila
          </h1>

          <!-- CARD -->
          <div class="bg-white/10 backdrop-blur-md border border-white/30 rounded-2xl px-8 py-10 text-center shadow-xl">

            <p class="text-white text-sm mb-2 tracking-wide">
              Kepada Yth.
            </p>

            <p class="text-white text-lg font-medium mb-6">
              Tamu Undangan
            </p>

            <button id="openBtn"
              class="flex items-center gap-2 px-6 py-3 rounded-full bg-white text-purple-700 font-medium shadow-lg hover:scale-105 transition duration-300 mx-auto">

              <img src="https://cdn-icons-png.flaticon.com/128/3731/3731748.png" alt="icon surat" class="w-5 h-5">

              Buka Undangan
            </button>

          </div>

        </div>

      </div>
    </section>

    <section id="content" class="hidden snap-y snap-mandatory h-screen overflow-y-scroll">

      <!-- Section 2 -->
      <div class="w-full h-screen snap-start overflow-hidden">
        <video autoplay muted loop playsinline class="w-full h-full object-cover block">
          <source src="section ke 2.mp4" type="video/mp4">
        </video>
      </div>

      <!-- Section 3 -->
      <div class="w-full h-screen snap-start overflow-hidden">
        <img src="1.png" alt="Section 3" class="w-full h-full object-cover block">
      </div>

      <!-- Section 4 -->
      <div class="w-full h-screen snap-start overflow-hidden">
        <img src="2.png" alt="Section 4" class="w-full h-full object-cover block">
      </div>

    </section>

  </div>

  <!-- ================= SCRIPT ================= -->
  <script>
    const openBtn = document.getElementById("openBtn");
    const cover = document.getElementById("cover");
    const content = document.getElementById("content");

    openBtn.addEventListener("click", function () {
      cover.remove();
      content.classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "instant" });
    });
  </script>

</body>

</html>
